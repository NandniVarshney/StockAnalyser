# ─── StockAnalyser — docker-compose ────────────────────────────────────────
# IMPORTANT: `acli rovodev serve` is NOT in this compose file — it runs on the
# HOST (separate terminal: `make rovodev`) because it needs your Atlassian
# credentials and MFA. The container reaches it via `host.docker.internal:8766`.
# ──────────────────────────────────────────────────────────────────────────────

services:
  api:
    build: .
    container_name: stockanalyser-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Reach the Rovo CLI running on the host
      ROVODEV_BASE_URL: "http://host.docker.internal:${ROVODEV_SERVE_PORT:-8766}"
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./.rovodev:/app/.rovodev:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"     # Linux compatibility
    restart: unless-stopped
    command: ["uvicorn", "stockanalyser.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
